user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance logging
    log_format main_json escape=json '{'
        '"time_local":"$time_local",'
        '"client_ip":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access_log.json main_json;

    # TCP Optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # GZIP Compression
    gzip on;
    gzip_disable "msie6";
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript xml;

    # Rate Limiting Zones (10 requests per second burst allocation limit)
    limit_req_zone $binary_remote_addr zone=api_limit_zone:10m rate=15r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit_zone:10m;

    # Load Balancer Upstream Configuration (RestoPro Clusters)
    upstream restopro_express_nodes {
        ip_hash; # Pin users to servers for dynamic sessions during handshake
        server restopro_backend_node:3000 max_fails=3 fail_timeout=15s;
        keepalive 32;
    }

    # Redirect HTTP traffic to HTTPS securely
    server {
        listen 80;
        server_name pos.restopro-enterprise.co;
        return 301 https://$host$request_uri;
    }

    # Main SSL Operational Server block
    server {
        listen 443 ssl;
        server_name pos.restopro-enterprise.co;

        # SSL certificates config
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern high safety ssl protocols
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Solid Security Headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Connection Limit Protection
        limit_conn conn_limit_zone 40;

        # Client Assets Static Serving (Caching rules)
        location /assets/ {
            proxy_pass http://restopro_express_nodes;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # WebSocket Socket.IO Gateway routing
        location /socket.io/ {
            proxy_pass http://restopro_express_nodes;
            proxy_http_version 1.1;
            proxy_buffering off;
            
            # Upgrade headers for keepalive
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended connection buffers for live terminals
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Standard API routes with active rate-limiting
        location /api/ {
            proxy_pass http://restopro_express_nodes;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Apply Rate Limiting
            limit_req zone=api_limit_zone burst=25 nodelay;
        }

        # Root fallback path
        location / {
            proxy_pass http://restopro_express_nodes;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
